version: '3.8'
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bimbel_alruumi
      POSTGRES_USER: bimbeluser
      POSTGRES_PASSWORD: bimbelpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bimbeluser -d bimbel_alruumi"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
